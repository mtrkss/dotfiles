## safe cflags
CFLAGS+=-O2 -pipe -funroll-loops -fno-strict-aliasing -mtune=native -march=native -fno-lto
COPTFLAGS+=-O2 -pipe -funroll-loops -fno-strict-aliasing -mtune=native -march=native -fno-lto
CXXFLAGS+=-O2 -pipe -funroll-loops -fno-strict-aliasing -mtune=native -march=native -fno-lto

CC=clang
CXX=clang++
CPP=clang-cpp
NM=/usr/bin/llvm-nm
AR=/usr/bin/llvm-ar
ARFLAGS=cr
RANLIB=/usr/bin/llvm-ranlib
RANLIBFLAGS=
