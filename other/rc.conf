clear_tmp_enable="YES"
hostname="exuviae"
wlans_iwm0="wlan0"
ifconfig_wlan0="WPA DHCP"
ifconfig_wlan0_ipv6="inet6 accept_rtadv"

kld_list="/boot/modules/ng_hci.ko cuse amdgpu"

blued_enable="YES"
moused_enable="YES"
ntpd_enable="YES"
ntpd_sync_on_start="YES"
powerd_enable="YES"
# Set dumpdev to "AUTO" to enable crash dumps, "NO" to disable
dumpdev="AUTO"
archlinux_enable="YES"
dbus_enable="YES"
